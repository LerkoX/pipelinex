Version: "1.0"
Name: template-render-example

# Param 示例：支持模板渲染和自引用
Param:
  # 基础变量
  env: "production"
  appName: "myapp"
  version: "1.2.3"

  # 使用模板拼接
  namespace: "{{ Param.appName }}-{{ Param.env }}"           # 渲染为: myapp-production

  # 自引用：一个 Param 引用另一个 Param
  registry: "myregistry.com"
  imageName: "{{ Param.registry }}/{{ Param.appName }}"     # 渲染为: myregistry.com/myapp
  imageTag: "{{ Param.version }}-{{ Param.buildId }}"

  # 构建ID（引用在后定义的变量）
  buildId: "build-12345"

  # 完整镜像路径（多层引用）
  fullImage: "{{ Param.imageName }}:{{ Param.imageTag }}"   # 渲染为: myregistry.com/myapp:1.2.3-build-12345

  # 嵌套结构
  config:
    replicas: 3
    envVars:
      - name: "ENVIRONMENT"
        value: "{{ Param.env }}"                            # 渲染为: production
      - name: "APP_VERSION"
        value: "{{ Param.version }}"                        # 渲染为: 1.2.3

  # 列表结构
  domains:
    - "{{ Param.appName }}.example.com"                     # 渲染为: myapp.example.com
    - "api.{{ Param.appName }}.com"                         # 渲染为: api.myapp.com

# Metadate 示例：支持引用 Param
Metadate:
  type: in-config
  description: "存储从输出提取的数据和渲染后的参数"
  data:
    # 引用 Param 中的值
    K8sNamespace: "{{ Param.namespace }}"                    # 渲染为: myapp-production
    ImagePrefix: "{{ Param.imageName }}"                     # 渲染为: myregistry.com/myapp
    DeployTag: "{{ Param.imageTag }}"                        # 渲染为: 1.2.3-build-12345

    # 组合多个 Param
    DeploymentName: "{{ Param.appName }}-{{ Param.env }}"    # 渲染为: myapp-production
    FullRegistryPath: "{{ Param.fullImage }}"               # 渲染为: myregistry.com/myapp:1.2.3-build-12345

    # 静态值（不被渲染）
    StaticValue: "this-is-static"

# 日志配置
Logging:
  endpoint: http://log-center/api/v1/logs
  headers:
    X-App-Name: "{{ Param.appName }}"                       # 注意：Logging.headers 目前不支持模板渲染
  timeout: 5s

# 执行图
Graph: |
  stateDiagram-v2
    [*] --> Build
    Build --> Deploy
    Deploy --> [*]

# 节点配置
Nodes:
  Build:
    executor: local
    steps:
      - name: validate-params
        run: |
          echo "Building image: {{ Param.fullImage }}"
          echo "Deploying to namespace: {{ Param.namespace }}"
          echo "App domains: {{ Param.domains | join: ', ' }}"

  Deploy:
    executor: local
    steps:
      - name: deploy-info
        run: |
          echo "Deploying {{ Param.fullImage }} to {{ Param.K8sNamespace }}"
          echo "Deployment name: {{ Param.DeploymentName }}"
          echo "Config replicas: {{ Param.config.replicas }}"
