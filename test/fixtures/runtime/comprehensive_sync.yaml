Param:
  env: "production"
  appName: "test-app"
Executors:
  local:
    type: local
    config:
      shell: bash
Metadate:
  type: in-config
  data:
    deployEnv: "{{ Param.env }}"
    appName: "{{ Param.appName }}"
Graph: |
  stateDiagram-v2
    [*] --> Task1
    Task1 --> Task2
Nodes:
  Task1:
    executor: local
    steps:
      - name: step1
        run: "echo 'Task1 executed'"
  Task2:
    executor: local
    steps:
      - name: step1
        run: "echo 'Task2 executed'"
