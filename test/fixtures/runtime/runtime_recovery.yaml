Param:
  env: "test"
Executors:
  local:
    type: local
    config:
      shell: bash
Graph: |
  stateDiagram-v2
    [*] --> Step1
    Step1 --> Step2
    Step2 --> Step3
    Step3 --> [*]
Nodes:
  Step1:
    executor: local
    steps:
      - name: step1
        run: "echo 'Step 1 executed'"
    runtime:
      status: SUCCESS  # 已完成，应该跳过

  Step2:
    executor: local
    steps:
      - name: step2
        run: "echo 'Step 2 executing (should run)'"
  Step3:
    executor: local
    steps:
      - name: step3
        run: "echo 'Step 3 should run after Step2 completes'"
