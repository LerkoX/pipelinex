Param:
  env: "production"
  namespace: "myapp"

Metadate:
  type: in-config
  data:
    K8sNamespace: "{{ Param.namespace }}-{{ Param.env }}"
    ImagePrefix: "myregistry.com/{{ Param.namespace }}/"

Executors:
  local:
    type: local
    config:
      shell: bash
Graph: |
  stateDiagram-v2
    [*] --> Task1
Nodes:
  Task1:
    executor: local
    steps:
      - name: step1
        run: "echo 'ns={{ K8sNamespace }}, prefix={{ ImagePrefix }}'"
