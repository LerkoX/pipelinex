Param:
  namespace: "default"
  cluster: "prod-cluster"

Metadate:
  type: in-config
  data:
    K8sNamespace: "{{ Param.namespace }}"
    ClusterName: "{{ Param.cluster }}"
    DeployTarget: "{{ Param.cluster }}/{{ Param.namespace }}"

Executors:
  local:
    type: local
    config:
      shell: bash
Graph: |
  stateDiagram-v2
    [*] --> Task1
Nodes:
  Task1:
    executor: local
    steps:
      - name: step1
        run: "echo 'Deploy'"
