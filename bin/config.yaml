Version: "1.0"
Name: 多节点测试
Param:
  projectName: pipelinex-demo
  buildId: "001"
  environment: production
Executors:
  local:
    type: local
    config:
      shell: /bin/bash
Graph: |
  stateDiagram-v2
    [*] --> Step1
    Step1 --> Step2
    Step1 --> Step3
    Step2 --> [*]
    Step3 --> [*]
Nodes:
  Step1:
    name: 显示项目信息
    executor: local
    steps:
      - name: echo-project
        run: 'echo "项目名称: {{ Param.projectName }}"'
      - name: echo-build-id
        run: 'echo "BuildId ID: {{ Param.buildId }}"'
  Step2:
    name: 测试任务A
    executor: local
    steps:
      - name: echo-env
        run: 'echo "任务A - 环境: {{ Param.environment }}"'
  Step3:
    name: 测试任务B
    executor: local
    steps:
      - name: echo-done
        run: 'echo "任务B - 所有步骤执行完成！"'
